<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ecnhaca | Social App</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="authBox" class="auth-container">
        <div class="auth-card animate-fade">
            <h1 class="logo-text">Ecnhaca</h1>
            <div class="auth-tabs">
                <button id="tL" class="active" onclick="setMode('login')">Entrar</button>
                <button id="tR" onclick="setMode('reg')">Registrarse</button>
            </div>
            <form onsubmit="doAuth(event)">
                <input type="text" id="u" placeholder="Usuario" required>
                <input type="email" id="e" placeholder="Correo" class="hide">
                <input type="password" id="p" placeholder="Contraseña" required>
                <button type="submit" id="btnA">Iniciar Sesión</button>
            </form>
        </div>
    </div>

    <div id="app" class="hide">
        <nav class="nav">
            <div class="nav-content">
                <div class="logo">Ecnhaca</div>
                <div class="search-box">
                    <i class="fa fa-search"></i>
                    <input type="text" placeholder="Buscar en Ecnhaca..." oninput="search(this.value)">
                </div>
                <div class="user-menu-wrapper">
                    <div class="user-trigger" onclick="toggleMenu()">
                        <div id="myAv" class="mini-av">E</div>
                    </div>
                    <div id="dropdown" class="dropdown hide">
                        <div class="drop-item" onclick="showView('profile')"><i class="fa fa-user"></i> Perfil</div>
                        <div class="drop-item" onclick="showView('settings')"><i class="fa fa-cog"></i> Configuración</div>
                        <hr>
                        <div class="drop-item logout" onclick="logout()"><i class="fa fa-sign-out"></i> Cerrar Sesión</div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="content">
            <div id="view-feed" class="view">
                <div id="results" class="results-list"></div>
                <div id="empty-msg" class="empty-state">
                    <i class="fa fa-bolt"></i>
                    <p>Busca a alguien para empezar</p>
                </div>
            </div>

            <div id="view-profile" class="view hide">
                <div class="profile-header">
                    <div id="pAv" class="big-av"></div>
                    <h2 id="pName"></h2>
                    <p id="pBio"></p>
                    <div class="stats-row">
                        <div class="stat"><b>Seguidores</b> <span id="s-followers">0</span></div>
                        <div class="stat"><b>Siguiendo</b> <span id="s-following">0</span></div>
                    </div>
                    <button class="btn-back" onclick="showView('feed')">Volver al inicio</button>
                </div>
            </div>

            <div id="view-settings" class="view hide">
                <div class="settings-card">
                    <h2>Configuración</h2>
                    <p><i class="fa fa-clock"></i> Próximamente: Cambiar foto, biografía y privacidad.</p>
                    <button class="btn-back" onclick="showView('feed')">Volver</button>
                </div>
            </div>
        </main>
    </div>

    <script src="/app.js"></script>
</body>
</html>
