<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DevRoot | Emmanuel Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-wall">
        <div class="auth-container">
            <h1 class="auth-logo">Dev<span>Root</span></h1>
            <p style="margin-bottom:30px; color:gray; font-weight:500;">La red social para el 1% de desarrolladores.</p>
            
            <div class="input-box">
                <label>NOMBRE DE USUARIO</label>
                <input type="text" id="reg-name" placeholder="Ej: Emmanuel_Dev">
            </div>
            
            <button class="btn-p" style="width:100%;" onclick="DevRoot.createAccount()">
                Crear Cuenta Profesional
            </button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <nav class="navbar">
            <div class="nav-content">
                <div class="auth-logo" style="font-size:1.8rem; margin:0; cursor:pointer;" onclick="location.reload()">Dev<span>Root</span></div>
                
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" class="search-input" placeholder="Buscar amigos..." oninput="DevRoot.search(this.value)">
                    <div id="search-results" class="search-results"></div>
                </div>

                <div class="user-menu-trigger" onclick="DevRoot.toggleDropdown()">
                    <span id="nav-user-name" style="font-weight:700;">Emmanuel</span>
                    <div class="nav-avatar" id="nav-av-icon">E</div>
                </div>

                <div id="acc-dropdown" class="dropdown-menu">
                    <div class="menu-link" onclick="DevRoot.showMyProfile()">
                        <i class="fa-regular fa-circle-user"></i> Ver Mi Perfil
                    </div>
                    <div class="menu-link" style="opacity:0.5; cursor:not-allowed;">
                        <i class="fa-solid fa-gear"></i> Configuración
                    </div>
                </div>
            </div>
        </nav>

        <div class="app-grid">
            <aside>
                <div class="card" style="padding:15px;">
                    <div class="menu-link" onclick="DevRoot.renderFeed()" style="background:var(--bg-alt); border-radius:12px; color:var(--p);">
                        <i class="fa-solid fa-house"></i> Inicio
                    </div>
                    <div class="menu-link"><i class="fa-solid fa-fire"></i> Tendencias</div>
                    <div class="menu-link"><i class="fa-solid fa-code"></i> Proyectos</div>
                </div>
            </aside>

            <main id="main-content"></main>

            <aside>
                <div class="card">
                    <h4 style="font-weight:800; margin-bottom:15px;">Estadísticas Rápidas</h4>
                    <p style="font-size:0.8rem; color:gray;">Bienvenido a DevRoot. Aquí verás el crecimiento de tu red en tiempo real.</p>
                </div>
            </aside>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
