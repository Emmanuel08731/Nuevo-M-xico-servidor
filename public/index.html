<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevRoot | Conexión Elite</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div id="auth-container" class="glass-card">
            <h1 class="logo">DEV<span>ROOT</span></h1>
            <p class="subtitle">Protocolo de acceso v6.0</p>

            <div id="login-form">
                <input type="email" id="login-email" placeholder="Email del Desarrollador">
                <input type="password" id="login-pass" placeholder="Contraseña">
                <button onclick="login()" class="btn-primary">ACCEDER</button>
                <p class="toggle-text">¿No tienes cuenta? <span onclick="toggleAuth()">Crear Perfil</span></p>
            </div>

            <div id="register-form" style="display: none;">
                <input type="text" id="reg-user" placeholder="Nombre de Usuario">
                <input type="email" id="reg-email" placeholder="Email">
                <input type="password" id="reg-pass" placeholder="Contraseña">
                <button onclick="register()" class="btn-success">REGISTRARSE</button>
                <p class="toggle-text">¿Ya eres miembro? <span onclick="toggleAuth()">Iniciar Sesión</span></p>
            </div>
        </div>

        <div id="dashboard" style="display: none;">
            <nav>
                <h2 class="logo-small">DEV<span>ROOT</span></h2>
                <div class="user-info">
                    <span id="display-name"></span>
                    <button onclick="logout()" class="btn-logout">Salir</button>
                </div>
            </nav>
            <main>
                <div class="stats-bar">
                    <div class="stat">Seguidores: <b id="stat-followers">0</b></div>
                    <div class="stat">Estado: <b id="stat-status">Cargando...</b></div>
                </div>
                <div class="feed-placeholder">
                    <h3>Feed de Proyectos</h3>
                    <p>Esperando despliegues de la comunidad...</p>
                </div>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
