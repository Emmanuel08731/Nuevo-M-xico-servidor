<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecnhaca | Elite Dev Network</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="loader" class="loader-overlay">
        <div class="loader-box">
            <h1 class="logo-load">ECNHACA</h1>
            <div class="bar-container"><div id="bar" class="bar-fill"></div></div>
            <p>Verificando base de datos...</p>
        </div>
    </div>
    <div id="toast-container"></div>
    <section id="auth-view" class="auth-page hide">
        <div class="auth-card">
            <div class="auth-top">
                <h2>ECNHACA</h2>
                <p id="auth-desc">Accede a tu cuenta profesional</p>
            </div>
            <div class="auth-tabs">
                <button id="tab-in" class="active" onclick="setMode('in')">Entrar</button>
                <button id="tab-up" onclick="setMode('up')">Registrarse</button>
            </div>
            <form id="auth-form" onsubmit="handleAuth(event)">
                <div class="field">
                    <label><i class="fa fa-user"></i> Usuario</label>
                    <input type="text" id="a-user" placeholder="@usuario" required>
                </div>
                <div id="email-field" class="field hide">
                    <label><i class="fa fa-envelope"></i> Correo</label>
                    <input type="email" id="a-email" placeholder="dev@ecnhaca.com">
                </div>
                <div class="field">
                    <label><i class="fa fa-lock"></i> Contraseña</label>
                    <input type="password" id="a-pass" placeholder="••••••••" required>
                </div>
                <button type="submit" id="a-btn" class="btn-primary">Iniciar Sesión</button>
            </form>
        </div>
    </section>
    <div id="main-view" class="app-view hide">
        <nav class="navbar">
            <div class="nav-left" onclick="goHome()">ECNHACA</div>
            <div class="nav-center">
                <div class="search-engine">
                    <select id="s-type">
                        <option value="user">Usuarios</option>
                        <option value="post">Publicaciones</option>
                    </select>
                    <input type="text" id="s-input" placeholder="Buscar..." oninput="doSearch()">
                    <i class="fa fa-search"></i>
                    <div id="s-results" class="results-box hide"></div>
                </div>
            </div>
            <div class="nav-right">
                <div class="profile-trigger" onclick="toggleMenu()">
                    <div id="nav-av" class="avatar-sm">E</div>
                    <i class="fa fa-chevron-down"></i>
                </div>
                <div id="drop-menu" class="menu-drop hide">
                    <div class="menu-head">
                        <p id="m-name">@emmanuel</p>
                        <span>Miembro Premium</span>
                    </div>
                    <div class="menu-item" onclick="openProfile()"><i class="fa fa-user"></i> Ver Perfil</div>
                    <div class="menu-item" onclick="openSettings()"><i class="fa fa-cog"></i> Ajustes</div>
                    <div class="menu-item" onclick="toggleTheme()"><i class="fa fa-moon"></i> Modo Oscuro</div>
                    <hr>
                    <div class="menu-item logout" onclick="logout()"><i class="fa fa-sign-out"></i> Cerrar Sesión</div>
                </div>
            </div>
        </nav>
        <main class="content">
            <div id="feed" class="post-grid"></div>
        </main>
        <button class="fab" onclick="showModal()"><i class="fa fa-plus"></i></button>
    </div>
    <div id="p-modal" class="modal hide">
        <div class="modal-card">
            <h3>Nueva Publicación</h3>
            <form onsubmit="createPost(event)">
                <input type="text" id="p-title" placeholder="Título" required>
                <textarea id="p-content" placeholder="¿Qué estás desarrollando?"></textarea>
                <select id="p-cat">
                    <option>Bot Discord</option>
                    <option>Web Design</option>
                    <option>PostgreSQL</option>
                </select>
                <div class="modal-btns">
                    <button type="button" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn-primary">Publicar</button>
                </div>
            </form>
        </div>
    </div>
    <script src="/script.js"></script>
    <script src="/app.js"></script>
</body>
</html>
