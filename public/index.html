<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevRoot | Emmanuel Store</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="authBox" class="auth-screen">
        <div class="card">
            <h1>Dev<b>Root</b></h1>
            <p>Red Social de Emmanuel</p>
            <div class="tabs">
                <button onclick="setAuth('login')" id="tabL" class="active">Login</button>
                <button onclick="setAuth('reg')" id="tabR">Registro</button>
            </div>
            <form onsubmit="ejecutarAuth(event)">
                <input type="text" id="user" placeholder="Usuario" required>
                <input type="email" id="mail" placeholder="Email" class="hidden">
                <input type="password" id="pass" placeholder="Contraseña" required>
                <button type="submit" id="mainBtn">Entrar</button>
            </form>
        </div>
    </div>

    <div id="webContent" class="hidden">
        <nav class="navbar">
            <div class="logo">Dev<b>Root</b></div>
            <div class="search">
                <input type="text" placeholder="Buscar amigos..." oninput="buscarDB(this.value)">
            </div>
            <div class="user-info" id="me">Cargando...</div>
        </nav>

        <div class="main-feed" id="feed">
            </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
