<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ecnhaca | Elite Community</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="loader" class="loader-overlay">
        <div class="loader-content">
            <h1 class="logo-load">Ecnhaca</h1>
            <div class="bar-container"><div class="bar-fill"></div></div>
            <p>Sincronizando con la red...</p>
        </div>
    </div>

    <button id="fab" class="fab hide" onclick="openModal()"><i class="fa fa-plus"></i></button>
    <div id="modal" class="modal hide">
        <div class="modal-card animate-up">
            <h3>Crear Publicación</h3>
            <form id="pForm" onsubmit="createPost(event)">
                <input type="text" id="pT" placeholder="Título" required>
                <textarea id="pD" placeholder="Descripción..."></textarea>
                <input type="text" id="pI" placeholder="URL Imagen">
                <select id="pC">
                    <option>Dev Discord Bot</option>
                    <option>Web Design</option>
                    <option>Roblox Assets</option>
                </select>
                <button type="submit" class="btn-main">Subir Ahora</button>
            </form>
            <button onclick="closeModal()" class="btn-close">Cancelar</button>
        </div>
    </div>

    <section id="auth" class="auth-box hide">
        <div class="glass-card">
            <h2>Ecnhaca</h2>
            <div class="tabs">
                <button id="tL" class="act" onclick="toggleAuth('L')">Entrar</button>
                <button id="tR" onclick="toggleAuth('R')">Registro</button>
            </div>
            <form onsubmit="handleAuth(event)">
                <input type="text" id="aU" placeholder="Usuario" required>
                <input type="email" id="aE" class="hide" placeholder="Email">
                <input type="password" id="aP" placeholder="Contraseña" required>
                <button type="submit" class="btn-main">Continuar</button>
            </form>
        </div>
    </section>

    <div id="app" class="hide">
        <nav class="glass-nav">
            <div class="nav-in">
                <div class="brand" onclick="goHome()">Ecnhaca</div>
                <div class="search-box">
                    <i class="fa fa-search"></i>
                    <input type="text" id="sIn" placeholder="Buscar usuarios o contenido..." oninput="doSearch(this.value)">
                    <div id="sRes" class="search-results hide"></div>
                </div>
                <div class="nav-right">
                    <div id="myAv" class="av-nav" onclick="toggleUserMenu()"></div>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <div id="feed" class="post-wall">
                </div>
        </main>
    </div>

    <script src="/script.js"></script>
    <script src="/app.js"></script>
</body>
</html>
