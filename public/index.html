<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Core | Infrastructure</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="system-toaster-bridge"></div>

    <div id="boot-overlay">
        <div class="boot-container">
            <h1 class="core-logo">Global<span>Core</span></h1>
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <p id="boot-status">Inicializando Red...</p>
        </div>
    </div>

    <section id="access-layer" class="layer-active">
        <div class="auth-box">
            <div class="auth-visual">
                <div class="v-content">
                    <div class="logo-sm">Global<span>Core</span></div>
                    <h2>Infraestructura Centralizada de Datos.</h2>
                    <p>Accede a la red global de control y gestión.</p>
                </div>
                <div class="v-status"><span class="pulse"></span> SISTEMA ACTIVO</div>
            </div>

            <div class="auth-form">
                <div class="form-inner">
                    <h3 id="form-title">Bienvenido</h3>
                    <div class="inputs-group">
                        <div class="field hidden" id="field-username">
                            <label>Nombre de Usuario</label>
                            <div class="input-ctrl">
                                <i class="fa-regular fa-user"></i>
                                <input type="text" id="in-username" placeholder="Usuario">
                            </div>
                        </div>
                        <div class="field">
                            <label id="lbl-cred">Correo Electrónico</label>
                            <div class="input-ctrl">
                                <i class="fa-regular fa-envelope"></i>
                                <input type="text" id="in-cred" placeholder="email@ecnhaca.site">
                            </div>
                        </div>
                        <div class="field">
                            <label>Clave Maestra</label>
                            <div class="input-ctrl">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="in-pass" placeholder="••••••••">
                            </div>
                        </div>
                    </div>
                    <button class="btn-primary" onclick="handleAuthAction()">
                        <span id="btn-text">ACCEDER</span>
                    </button>
                    <div class="form-toggle">
                        <span id="toggle-msg">¿No tienes cuenta?</span>
                        <button onclick="switchMode()" id="toggle-btn">Regístrate</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <main id="core-app" class="hidden">
        <nav class="core-nav">
            <div class="nav-container">
                <div class="nav-brand">Global<span>Core</span></div>
                <div class="nav-search">
                    <div class="search-ctrl">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Buscar identidades..." onkeyup="searchIdentities(this.value)">
                        <div id="search-drop" class="hidden"></div>
                    </div>
                </div>
                <div class="nav-user" onclick="toggleMenu()">
                    <div class="u-avatar" id="nav-av">?</div>
                    <div class="u-meta">
                        <strong id="nav-name">Admin</strong>
                        <small id="nav-role">Standard</small>
                    </div>
                    <div id="user-menu" class="hidden">
                        <button onclick="openMyProfile()">Perfil</button>
                        <button onclick="location.reload()">Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </nav>

        <section class="core-view">
            <div class="view-grid">
                <aside class="sidebar-left">
                    <div class="menu-card">
                        <div class="m-item active"><i class="fa-solid fa-house"></i> Feed Global</div>
                        <div class="m-item"><i class="fa-solid fa-chart-line"></i> Estadísticas</div>
                        <div class="m-item"><i class="fa-solid fa-database"></i> Registros SQL</div>
                    </div>
                </aside>

                <div class="main-feed">
                    <div class="post-creator">
                        <textarea id="post-input" placeholder="¿Qué quieres registrar en el Core?"></textarea>
                        <div class="creator-actions">
                            <button class="btn-post" onclick="submitPost()">PUBLICAR</button>
                        </div>
                    </div>
                    <div id="feed-container">
                        </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
