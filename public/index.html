<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emmanuel Store | Social Network</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="authWall" class="auth-wall hidden">
        <div class="auth-form animate-up">
            <h1 class="brand-logo" style="font-size: 3rem; margin-bottom: 10px;">DevRoot</h1>
            <p style="color: #666; margin-bottom: 30px;">Únete a la comunidad de Emmanuel Store</p>
            
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label><i class="fa-solid fa-user"></i> Usuario</label>
                    <input type="text" name="username" placeholder="ej. emmanuel_dev" required>
                </div>
                <div class="input-group">
                    <label><i class="fa-solid fa-envelope"></i> Email</label>
                    <input type="email" name="email" placeholder="correo@ejemplo.com" required>
                </div>
                <div class="input-group">
                    <label><i class="fa-solid fa-lock"></i> Contraseña</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary-big">Crear Cuenta Gratis</button>
            </form>
            
            <p class="switch-auth">¿Ya tienes cuenta? <a href="#" onclick="toggleAuth()">Inicia Sesión</a></p>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-left">
            <h2 class="brand-logo" onclick="location.reload()">DevRoot</h2>
        </div>

        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="globalSearch" placeholder="Buscar amigos en Emmanuel Store..." oninput="performSearch(this.value)">
        </div>

        <div class="nav-right" id="navActions">
            <div class="user-pill">
                <span id="navUsername">Cargando...</span>
                <div class="mini-avatar" id="navAvatar">E</div>
            </div>
        </div>
    </nav>

    <div class="container">
        <aside class="sidebar-left">
            <div class="side-item active"><i class="fa-solid fa-house"></i> <span>Para ti</span></div>
            <div class="side-item"><i class="fa-solid fa-users"></i> <span>Siguiendo</span></div>
            <div class="side-item"><i class="fa-solid fa-video"></i> <span>Explorar</span></div>
            <hr class="side-divider">
            <p class="side-title">Cuentas recomendadas</p>
            <div id="recommendedSidebar"></div>
        </aside>

        <main class="feed-grid">
            <div class="feed-header">
                <h3>Tendencias Populares</h3>
            </div>
            
            <div id="mainFeed">
                <div class="loading-shimmer"></div>
            </div>
        </main>

        <aside class="sidebar-right">
            <div class="stats-card">
                <h4>Tu Impacto</h4>
                <div class="stat-row">
                    <span>Seguidores</span>
                    <b id="userFollowers">0</b>
                </div>
                <div class="stat-row">
                    <span>Siguiendo</span>
                    <b id="userFollowing">0</b>
                </div>
            </div>
            <div class="footer-links">
                <p>© 2026 Emmanuel Store Oficial</p>
                <p>PostgreSQL Cloud Database</p>
            </div>
        </aside>
    </div>

    <div id="toastContainer"></div>

    <script src="app.js"></script>
</body>
</html>
