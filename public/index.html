<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ecnhaca | Elite Platform</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="light-theme">

    <div id="loader" class="loader-overlay">
        <div class="loader-content">
            <h1 class="animate-pulse">ECNHACA</h1>
            <div class="progress-container"><div id="bar" class="progress-bar"></div></div>
            <p id="loader-msg">Iniciando entorno seguro...</p>
        </div>
    </div>

    <div id="notif-box" class="notif-area"></div>

    <section id="auth-view" class="auth-page hide">
        <div class="auth-card animate-fade">
            <header>
                <h2>Bienvenido</h2>
                <p>Ingresa a tu cuenta profesional de Ecnhaca</p>
            </header>

            <div class="auth-modes">
                <button id="mode-in" class="active" onclick="setAuth('in')">Entrar</button>
                <button id="mode-up" onclick="setAuth('up')">Registrarse</button>
            </div>

            <form id="form-login" onsubmit="processAuth(event)">
                <div class="input-wrap">
                    <label>Nombre de Usuario</label>
                    <input type="text" id="user-input" placeholder="@usuario" required>
                </div>
                <div id="email-wrap" class="input-wrap hide">
                    <label>Email Corporativo</label>
                    <input type="email" id="email-input" placeholder="correo@ejemplo.com">
                </div>
                <div class="input-wrap">
                    <label>Contraseña Maestra</label>
                    <input type="password" id="pass-input" placeholder="••••••••" required>
                </div>
                <button type="submit" id="auth-btn" class="btn-main">Acceder al Sistema</button>
            </form>
        </div>
    </section>

    <div id="main-view" class="app-interface hide">
        <nav class="top-nav">
            <div class="nav-container">
                <div class="brand" onclick="navigate('home')">ECNHACA</div>
                
                <div class="search-box">
                    <i class="fa fa-search"></i>
                    <input type="text" id="search-q" placeholder="Buscar en la red..." oninput="triggerSearch(this.value)">
                    <div id="search-results" class="results-pop hide"></div>
                </div>

                <div class="user-hub">
                    <div id="nav-av" class="nav-avatar" onclick="showUserMenu()"></div>
                    <div id="user-menu" class="user-dropdown hide">
                        <div class="item" onclick="navigate('profile')">Mi Perfil</div>
                        <div class="item logout" onclick="closeSession()">Cerrar Sesión</div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="content-scroll">
            <section id="feed" class="active-tab">
                <div class="header-tab">
                    <h1>Muro de Actividad</h1>
                    <p>Proyectos y actualizaciones de la comunidad</p>
                </div>
                <div id="grid-posts" class="grid-layout"></div>
            </section>
        </main>

        <button class="fab-new" onclick="openModal()">
            <i class="fa fa-plus"></i>
            <span>NUEVO PROYECTO</span>
        </button>
    </div>

    <div id="post-modal" class="modal-wrap hide">
        <div class="modal-inner">
            <h3>Nueva Publicación</h3>
            <form onsubmit="postContent(event)">
                <input type="text" id="p-title" placeholder="Título del proyecto" required>
                <textarea id="p-body" placeholder="Describe tu avance..."></textarea>
                <select id="p-cat">
                    <option>Web Design</option>
                    <option>Discord Bot</option>
                    <option>Database</option>
                </select>
                <button type="submit" class="btn-main">Publicar Ahora</button>
            </form>
            <button onclick="closeModal()" class="btn-close">Cerrar</button>
        </div>
    </div>

    <script src="/script.js"></script>
    <script src="/app.js"></script>
</body>
</html>
