<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ecnhaca | Elite Platform</title>
    
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="light-mode">

    <div id="system-boot" class="boot-layer">
        <div class="boot-container">
            <div class="logo-text">ECNHACA</div>
            <div class="loader-track"><div id="boot-progress" class="loader-fill"></div></div>
            <p id="boot-status">Inicializando núcleo de seguridad...</p>
        </div>
    </div>

    <div id="toast-container"></div>

    <section id="auth-view" class="auth-wrapper">
        <div class="auth-card animate-slide-up">
            <header class="auth-header">
                <h2>Identificación</h2>
                <p>Inicia sesión para acceder a la red Ecnhaca</p>
            </header>

            <div class="auth-tabs">
                <button id="tab-login" class="active" onclick="toggleAuth('login')">Entrar</button>
                <button id="tab-register" onclick="toggleAuth('register')">Registrarse</button>
            </div>

            <form id="auth-form" onsubmit="handleAuthSubmit(event)">
                <div class="input-field">
                    <label>Nombre de usuario</label>
                    <div class="input-box">
                        <i class="fa fa-user"></i>
                        <input type="text" id="a-user" placeholder="ej. usuario123" required>
                    </div>
                </div>
                <div id="email-group" class="input-field hide">
                    <label>Correo electrónico</label>
                    <div class="input-box">
                        <i class="fa fa-envelope"></i>
                        <input type="email" id="a-email" placeholder="email@ecnhaca.com">
                    </div>
                </div>
                <div class="input-field">
                    <label>Contraseña</label>
                    <div class="input-box">
                        <i class="fa fa-lock"></i>
                        <input type="password" id="a-pass" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" id="btn-auth-action" class="btn-main">Acceder al Sistema</button>
            </form>
        </div>
    </section>

    <div id="app-view" class="hide">
        <nav class="navbar">
            <div class="nav-inner">
                <div class="nav-logo" onclick="appNavigator.goHome()">ECNHACA</div>
                
                <div class="search-module">
                    <i class="fa fa-search"></i>
                    <input type="text" id="global-search" placeholder="Buscar perfiles o proyectos..." oninput="appSearch.execute(this.value)">
                    <div id="search-dropdown" class="search-res-drop hide">
                        </div>
                </div>

                <div class="nav-profile">
                    <div id="profile-trigger" class="profile-btn" onclick="uiControl.toggleMenu()">
                        <div id="me-avatar" class="av-circle"></div>
                        <i class="fa fa-chevron-down"></i>
                    </div>
                    <div id="me-menu" class="drop-menu hide">
                        <div class="menu-item" onclick="appNavigator.goProfile()"><i class="fa fa-user"></i> Mi Perfil</div>
                        <div class="menu-item logout" onclick="authManager.logout()"><i class="fa fa-power-off"></i> Cerrar Sesión</div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="app-content">
            <section id="feed-section" class="active-tab">
                <header class="content-header">
                    <h1>Actividad Global</h1>
                    <p>Contenido actualizado de la red profesional</p>
                </header>
                <div id="publications-grid" class="grid-layout">
                    </div>
            </section>
        </main>

        <button class="fab-btn-left" onclick="uiControl.openPostModal()">
            <i class="fa fa-plus"></i>
            <span>NUEVO</span>
        </button>
    </div>

    <script src="/script.js"></script>
    <script src="/app.js"></script>
</body>
</html>
