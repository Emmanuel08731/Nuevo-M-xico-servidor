<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core | Infrastructure</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="bg-particles"></canvas>
    <div id="system-toaster"></div>

    <div id="system-loader">
        <div class="loader-content">
            <h1 class="logo-glitch">Dev<span>Root</span></h1>
            <div class="progress-container"><div id="bar-fill"></div></div>
            <span id="load-msg">Verificando Kernels...</span>
        </div>
    </div>

    <section id="gateway-auth" class="visible">
        <div class="gate-card">
            <div class="gate-info">
                <div class="brand">Dev<span>Root</span></div>
                <div class="info-body">
                    <h2>Gestión de Infraestructura Centralizada.</h2>
                    <p>Acceso restringido a terminales autorizadas.</p>
                </div>
                <div class="info-footer">
                    <span class="status"><i class="fa-solid fa-circle-check"></i> SYSTEM READY</span>
                </div>
            </div>

            <div class="gate-form">
                <div class="form-wrap">
                    <h3 id="gate-title">Identificación</h3>
                    <div class="inputs">
                        <div class="field hidden" id="field-user">
                            <label>Identificador</label>
                            <input type="text" id="in-user" placeholder="Usuario">
                        </div>
                        <div class="field">
                            <label id="lbl-id">Credencial</label>
                            <input type="text" id="in-identity" placeholder="Email o Usuario">
                        </div>
                        <div class="field">
                            <label>Clave</label>
                            <div class="pass-box">
                                <input type="password" id="in-pass" placeholder="••••••••">
                                <i class="fa-regular fa-eye" onclick="toggleSecret()"></i>
                            </div>
                        </div>
                    </div>
                    <button class="btn-primary" onclick="processAuth()">
                        <span id="btn-label">ACCEDER</span>
                    </button>
                    <div class="switcher">
                        <span id="sw-text">¿Sin registros?</span>
                        <button onclick="toggleGateMode()" id="sw-btn">Crear Identidad</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <main id="app-shell" class="hidden">
        <nav class="shell-nav">
            <div class="nav-content">
                <div class="brand">Dev<span>Root</span></div>
                <div class="search-engine">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="global-q" placeholder="Buscar identidades..." onkeyup="searchCore(this.value)">
                    <div id="search-results" class="hidden"></div>
                </div>
                <div class="user-meta" onclick="toggleDrop()">
                    <div id="u-av" class="avatar-sm">?</div>
                    <div class="u-text">
                        <strong id="u-name">Admin</strong>
                        <small id="u-status">Standard</small>
                    </div>
                    <div id="drop-menu" class="hidden">
                        <button onclick="location.reload()">Desconectar</button>
                    </div>
                </div>
            </div>
        </nav>

        <div class="shell-content">
            <div class="empty-layout">
                <i class="fa-solid fa-server"></i>
                <h2>Panel de Control Vacío</h2>
                <p>Busca otros usuarios para integrarlos a tu red de trabajo.</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
