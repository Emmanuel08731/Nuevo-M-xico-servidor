<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecnhaca | Elite Dev Community</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="app-loader" class="full-loader">
        <div class="loader-box">
            <h1 class="logo-text">ECNHACA</h1>
            <div class="progress-container"><div id="bar" class="progress-bar"></div></div>
            <p id="status-msg">Iniciando sistemas de Emmanuel...</p>
        </div>
    </div>

    <div id="notif-container"></div>

    <section id="view-auth" class="auth-wrapper hide">
        <div class="auth-card">
            <h1>Bienvenido</h1>
            <div class="auth-tabs">
                <button id="btn-tab-in" class="active" onclick="setAuth('in')">Entrar</button>
                <button id="btn-tab-up" onclick="setAuth('up')">Registrarse</button>
            </div>
            <form id="auth-form" onsubmit="executeAuth(event)">
                <input type="text" id="in-user" placeholder="Nombre de usuario" required>
                <input type="email" id="in-email" class="hide" placeholder="Correo electrónico">
                <input type="password" id="in-pass" placeholder="Contraseña" required>
                <button type="submit" class="btn-primary">Acceder</button>
            </form>
        </div>
    </section>

    <div id="view-app" class="hide">
        <nav class="main-nav">
            <div class="nav-content">
                <div class="logo" onclick="goHome()">Ecnhaca</div>
                
                <div class="search-engine">
                    <i class="fa fa-search"></i>
                    <input type="text" id="global-search" placeholder="Buscar creadores o bots..." oninput="handleSearch(this.value)">
                    <div id="search-results" class="results-dropdown hide">
                        </div>
                </div>

                <div class="nav-user" onclick="toggleDrop()">
                    <div id="me-av" class="avatar-sm"></div>
                    <div id="me-menu" class="dropdown-menu hide">
                        <div onclick="showProfile()"><i class="fa fa-user"></i> Mi Perfil</div>
                        <div onclick="doLogout()" class="red"><i class="fa fa-sign-out-alt"></i> Salir</div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="feed-layout">
            <div id="feed-wall" class="project-grid">
                </div>
        </main>

        <button class="fab-left" onclick="openPostModal()">
            <i class="fa fa-plus"></i>
            <span>Nuevo Post</span>
        </button>
    </div>

    <div id="post-modal" class="modal-overlay hide">
        <div class="modal-content animate-slide-up">
            <h2>Crear Publicación</h2>
            <form onsubmit="submitPost(event)">
                <input type="text" id="p-name" placeholder="Título del proyecto" required>
                <textarea id="p-desc" placeholder="Describe tu creación..." required></textarea>
                <input type="text" id="p-img" placeholder="URL de la imagen (Opcional)">
                <select id="p-cat">
                    <option value="Dev Discord Bot">Dev Discord Bot</option>
                    <option value="Web Dashboard">Web Dashboard</option>
                    <option value="Roblox Clothing">Roblox Clothing</option>
                    <option value="API / Database">API / Database</option>
                </select>
                <button type="submit" class="btn-primary">Publicar Ahora</button>
            </form>
            <button onclick="closePostModal()" class="btn-text">Cancelar</button>
        </div>
    </div>

    <script src="/script.js"></script>
    <script src="/app.js"></script>
</body>
</html>
