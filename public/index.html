<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevRoot | Emmanuel Director</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="auth-portal" class="auth-wrapper">
        <div class="glass-card">
            <div class="side-dark">
                <h1>Dev<span>Root</span></h1>
                <p>Infraestructura para mentes digitales.</p>
                <div class="mini-terminal">
                    <code>> system.init("Emmanuel");</code><br>
                    <code>> status: ONLINE</code>
                </div>
            </div>
            <div class="side-white">
                <h2>Bienvenido de Nuevo</h2>
                <div class="input-group">
                    <label>Email de Desarrollador</label>
                    <input type="email" id="email" placeholder="dev@emmanuel.store">
                </div>
                <div class="input-group">
                    <label>Llave Maestra</label>
                    <input type="password" id="pass" placeholder="••••••••">
                </div>
                <button onclick="access()" class="btn-primary">Conectar Nodo</button>
            </div>
        </div>
    </div>

    <main id="dashboard" class="hidden">
        <nav class="top-nav">
            <div class="logo">Dev<span>Root</span></div>
            <div class="user-info">Director: Emmanuel</div>
        </nav>
        <div class="content">
            <h1>Panel de Control v6.0</h1>
            <p>Gestionando Vexo Bot y Emerald Hosting.</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
