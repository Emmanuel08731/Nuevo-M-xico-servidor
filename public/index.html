<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevRoot | Emmanuel Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="auth-wall">
        <div class="glass-card animate-pop">
            <h1 class="logo">Dev<span>Root</span></h1>

            <div id="login-view">
                <p class="subtitle">Bienvenido de nuevo</p>
                <div class="input-box">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="l-user" placeholder="Usuario">
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="l-pass" placeholder="Contraseña">
                </div>
                <button onclick="App.auth('login')" class="btn-main">Entrar</button>
                <p class="switch-txt">¿No tienes cuenta? <a href="#" onclick="App.switch('register')">Créala aquí</a></p>
            </div>

            <div id="register-view" class="hidden">
                <p class="subtitle">Crear nueva cuenta</p>
                <div class="input-box">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="r-user" placeholder="Nombre de usuario">
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="r-email" placeholder="Tu Gmail">
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="r-pass" placeholder="Contraseña">
                </div>
                <button onclick="App.auth('register')" class="btn-main">Registrarme</button>
                <p class="switch-txt">¿Ya tienes cuenta? <a href="#" onclick="App.switch('login')">Inicia sesión</a></p>
            </div>
        </div>
    </section>

    <main id="app-wall" class="hidden">
        <nav class="navbar">
            <div class="nav-inner">
                <div class="logo-s">Dev<span>Root</span></div>
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Buscar usuarios..." oninput="App.search(this.value)">
                    <div id="search-res" class="search-drop"></div>
                </div>
                <div class="user-menu">
                    <div class="trigger" onclick="App.toggleMenu()">
                        <span id="nav-name">User</span>
                        <div id="nav-av" class="av">?</div>
                    </div>
                    <div id="drop-menu" class="dropdown">
                        <div class="drop-item"><i class="fa-regular fa-user"></i> Perfil</div>
                        <div class="drop-item"><i class="fa-solid fa-gear"></i> Configuración</div>
                        <div class="drop-item logout" onclick="location.reload()"><i class="fa-solid fa-power-off"></i> Cerrar Sesión</div>
                    </div>
                </div>
            </div>
        </nav>
        <div class="main-content">
            <div class="empty-state">
                <i class="fa-regular fa-folder-open"></i>
                <p>Todavía no hay publicaciones.</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
