<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevRoot | Emmanuel Store Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="auth-wall">
        <div class="glass-card animate-pop">
            <h1 class="logo-main">Dev<span>Root</span></h1>
            <p class="subtitle">La base de datos global de Emmanuel</p>
            
            <div id="auth-forms">
                <div class="input-box">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="user-in" placeholder="Tu usuario único">
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="pass-in" placeholder="Contraseña">
                </div>
                
                <button onclick="App.auth('login')" class="btn-primary">Entrar al Sistema</button>
                <button onclick="App.auth('register')" class="btn-secondary">Crear Cuenta Global</button>
            </div>
            <div id="loader" class="loader hidden"></div>
        </div>
    </section>

    <main id="app-wall" class="hidden">
        <nav class="navbar">
            <div class="nav-container">
                <div class="brand">Dev<span>Root</span></div>
                
                <div class="search-engine">
                    <div class="search-input-wrap">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Buscar por nombre..." oninput="App.search(this.value)">
                    </div>
                    <div id="res-dropdown" class="search-dropdown"></div>
                </div>

                <div class="user-panel">
                    <div class="profile-trigger" onclick="App.toggleDrop()">
                        <div id="nav-av" class="avatar-mini">?</div>
                        <span id="nav-name">Cargando...</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </div>

                    <div id="drop-menu" class="dropdown-menu">
                        <div class="menu-info">
                            <small>Conectado como:</small>
                            <p id="menu-user-full">Emmanuel</p>
                        </div>
                        <hr>
                        <div class="menu-item" onclick="App.view('profile')">
                            <i class="fa-regular fa-circle-user"></i> Mi Perfil
                        </div>
                        <div class="menu-item">
                            <i class="fa-solid fa-gear"></i> Configuración
                        </div>
                        <div class="menu-item logout" onclick="location.reload()">
                            <i class="fa-solid fa-power-off"></i> Cerrar Sesión
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <section class="main-layout">
            <div id="content-area" class="animate-slide">
                <div class="welcome-card">
                    <h2>Bienvenido a la Red Global</h2>
                    <p>Usa el buscador central para encontrar otros usuarios en la base de datos de Postgres.</p>
                    <div class="empty-feed-img">
                        <i class="fa-solid fa-database"></i>
                        <p>No hay publicaciones recientes todavía.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
