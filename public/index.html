<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ECNHACA V125 | Master Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div id="boot-loader" class="boot-loader">
        <div class="terminal-loader">
            <div id="boot-text">Sincronizando con Emmanuel Store...</div>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>
    </div>

    <div id="toast-wrapper"></div>

    <section id="auth-view" class="view-center hide">
        <div class="auth-card">
            <h1>ECN<span>HACA</span></h1>
            <div class="auth-tabs">
                <button id="tab-login" class="active" onclick="setAuthMode('login')">LOGIN</button>
                <button id="tab-reg" onclick="setAuthMode('reg')">REGISTRO</button>
            </div>
            <form id="auth-form" onsubmit="handleAuth(event)">
                <input type="text" id="auth-user" placeholder="Nombre de Usuario" required>
                <input type="email" id="auth-email" class="hide" placeholder="correo@gmail.com">
                <input type="password" id="auth-pass" placeholder="Contraseña Master" required>
                <button type="submit" class="btn-glow">ACCEDER AL NÚCLEO</button>
            </form>
        </div>
    </section>

    <main id="app-view" class="app-layout hide">
        <aside class="sidebar">
            <div class="brand">ECNHACA v125</div>
            <nav>
                <div class="nav-link active" onclick="nav('dashboard')"><i class="fa fa-home"></i> Dashboard</div>
                <div class="nav-link" onclick="nav('feed')"><i class="fa fa-rss"></i> Global Feed</div>
                <div id="admin-nav" class="nav-link admin-only hide" onclick="nav('admin')"><i class="fa fa-shield-halved"></i> MASTER PANEL</div>
            </nav>
            <div class="user-card-small">
                <div id="u-av" class="av">E</div>
                <div class="u-info"><span id="u-name">Emmanuel</span><small id="u-role">Admin</small></div>
            </div>
            <button class="logout" onclick="logout()">LOGOUT</button>
        </aside>

        <section class="content-area">
            <header class="top-bar">
                <div class="search-box">
                    <i class="fa fa-search"></i>
                    <input type="text" placeholder="Buscar en la red..." oninput="globalSearch()">
                </div>
            </header>

            <div id="sec-dashboard" class="sec">
                <h2>Bienvenido al Centro de Control</h2>
                <div class="stats-grid">
                    <div class="stat-item"><h3>Users</h3><p id="st-users">0</p></div>
                    <div class="stat-item"><h3>Posts</h3><p id="st-posts">0</p></div>
                </div>
            </div>

            <section id="sec-admin" class="sec hide">
                <h2>Terminal de Usuarios</h2>
                <div class="admin-search">
                    <input type="text" id="admin-q" placeholder="Buscar por ID, Nombre o Gmail..." oninput="filterAdminUsers()">
                </div>
                <div class="table-container">
                    <table class="master-table">
                        <thead><tr><th>ID</th><th>Usuario</th><th>Email</th><th>Rol</th><th>Acción</th></tr></thead>
                        <tbody id="admin-tbody"></tbody>
                    </table>
                </div>
            </section>
            
            </section>
    </main>

    <script src="script.js"></script>
    <script src="app.js"></script>
</body>
</html>
