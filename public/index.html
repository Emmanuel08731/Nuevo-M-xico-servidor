<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevRoot | Emmanuel Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="auth-wall">
        <div class="auth-card">
            <h1 class="logo">Dev<span>Root</span></h1>
            <p>Inicia sesión para conectar</p>
            <div class="input-group">
                <input type="text" id="user-in" placeholder="Nombre de usuario">
                <input type="password" id="pass-in" placeholder="Contraseña">
            </div>
            <button onclick="App.auth('login')" class="btn-primary">Entrar</button>
            <button onclick="App.auth('register')" class="btn-link">Crear cuenta nueva</button>
        </div>
    </section>

    <main id="app-wall" class="hidden">
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo-small">Dev<span>Root</span></div>
                
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Buscar usuarios..." oninput="App.search(this.value)">
                    <div id="search-results" class="search-dropdown"></div>
                </div>

                <div class="profile-section">
                    <div class="profile-trigger" onclick="App.toggleMenu()">
                        <span id="nav-user-name">Usuario</span>
                        <div id="nav-avatar" class="avatar-circle">?</div>
                    </div>
                    
                    <div id="user-menu" class="dropdown-content">
                        <div class="drop-item"><i class="fa-regular fa-user"></i> Mi Perfil</div>
                        <div class="drop-item"><i class="fa-solid fa-sliders"></i> Configuración</div>
                        <div class="drop-item logout" onclick="location.reload()">
                            <i class="fa-solid fa-power-off"></i> Cerrar Sesión
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <section class="main-content">
            <div class="feed-container">
                <div class="empty-feed">
                    <i class="fa-regular fa-face-smile"></i>
                    <h2>¡Bienvenido, <span id="welcome-name"></span>!</h2>
                    <p>Todavía no hay publicaciones globales. Sé el primero en compartir algo.</p>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
