<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ecnhaca | Software & Design</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="ec-theme">

    <div id="splash" class="splash-screen">
        <div class="splash-content">
            <h1 class="logo-anim">ECNHACA</h1>
            <div class="loader-track"><div id="load-bar" class="loader-fill"></div></div>
            <p id="splash-msg">Cargando base de datos...</p>
        </div>
    </div>

    <div id="toast-box" class="toast-area"></div>

    <section id="auth-screen" class="auth-page hide">
        <div class="auth-box animate-pop">
            <header class="auth-head">
                <h2>Ecnhaca Platform</h2>
                <p id="auth-desc">Acceso restringido. Por favor identifícate.</p>
            </header>

            <div class="auth-modes">
                <button id="tab-login" class="mode-btn active" onclick="toggleAuth('login')">Entrar</button>
                <button id="tab-reg" class="mode-btn" onclick="toggleAuth('reg')">Registrarse</button>
            </div>

            <form id="auth-form" onsubmit="executeAuth(event)">
                <div class="form-group">
                    <label>Nombre de Usuario</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-user-gear"></i>
                        <input type="text" id="user-field" placeholder="@usuario_dev" required>
                    </div>
                </div>

                <div id="reg-box" class="hide">
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <div class="input-icon">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="email-field" placeholder="dev@ecnhaca.site">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Contraseña Maestra</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-shield-halved"></i>
                        <input type="password" id="pass-field" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" id="auth-action" class="btn-main">Iniciar Sesión Ahora</button>
            </form>
        </div>
    </section>

    <div id="main-screen" class="app-layout hide">
        
        <nav class="top-nav">
            <div class="nav-container">
                <div class="logo-brand" onclick="goHome()">ECNHACA</div>

                <div class="search-hub">
                    <div class="search-bar">
                        <select id="search-select">
                            <option value="users">Usuarios</option>
                            <option value="posts">Publicaciones</option>
                        </select>
                        <input type="text" id="search-input" placeholder="Buscar en la red..." oninput="searchEngine(this.value)">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                    <div id="search-results" class="search-dropdown hide"></div>
                </div>

                <div class="user-hub">
                    <div class="user-trigger" onclick="openUserMenu()">
                        <div id="nav-avatar" class="avatar-circle">E</div>
                        <i class="fa-solid fa-angle-down"></i>
                    </div>

                    <div id="user-menu" class="menu-popup hide">
                        <div class="menu-top">
                            <p id="menu-user-name">@emmanuel</p>
                            <span class="badge">DEVELOPER PREMIUM</span>
                        </div>
                        <div class="menu-links">
                            <div class="link-item" onclick="viewMyProfile()">
                                <i class="fa-regular fa-circle-user"></i> Mi Perfil Profesional
                            </div>
                            <div class="link-item" onclick="openSettings()">
                                <i class="fa-solid fa-sliders"></i> Ajustes del Sistema
                            </div>
                            <div class="link-item" onclick="switchTheme()">
                                <i class="fa-solid fa-palette"></i> Cambiar Estética
                            </div>
                            <hr>
                            <div class="link-item logout" onclick="logoutSession()">
                                <i class="fa-solid fa-power-off"></i> Finalizar Sesión
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <section id="feed-view" class="view">
                <div class="hero-section">
                    <h1>Muro de Actividad</h1>
                    <p>Las últimas innovaciones en Ecnhaca Platform.</p>
                </div>
                <div id="post-feed" class="post-grid"></div>
            </section>

            <section id="profile-view" class="view hide">
                <div id="profile-data"></div>
            </section>
        </main>

        <button class="fab-new" onclick="showModalPost()">
            <i class="fa-solid fa-plus"></i>
            <span>NUEVO</span>
        </button>

    </div>

    <div id="modal-post" class="modal-blur hide">
        <div class="modal-box animate-up">
            <header class="modal-head">
                <h3>Nueva Publicación</h3>
                <button class="btn-close" onclick="hideModalPost()">&times;</button>
            </header>
            <form onsubmit="submitNewPost(event)">
                <div class="modal-body">
                    <input type="text" id="p-title" placeholder="Título del proyecto" required>
                    <textarea id="p-text" placeholder="Describe tu avance o código..." required></textarea>
                    <div class="modal-inputs">
                        <select id="p-cat">
                            <option>Discord Bot</option>
                            <option>Web Design</option>
                            <option>Base de Datos</option>
                        </select>
                        <input type="text" id="p-img" placeholder="URL de Imagen (opcional)">
                    </div>
                </div>
                <footer class="modal-foot">
                    <button type="button" class="btn-cancel" onclick="hideModalPost()">Cancelar</button>
                    <button type="submit" class="btn-post">Publicar en Ecnhaca</button>
                </footer>
            </form>
        </div>
    </div>

    <script src="/script.js"></script>
    <script src="/app.js"></script>
</body>
</html>
