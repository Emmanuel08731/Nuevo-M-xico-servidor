<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecnhaca | Community</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="toast-box"></div>

    <button id="btn-add-post" class="fab-btn" onclick="openPostModal()">
        <i class="fa fa-plus"></i>
    </button>

    <div id="modal-post" class="modal hide">
        <div class="modal-content animate-pop">
            <div class="modal-header">
                <h3>Nueva Publicación</h3>
                <i class="fa fa-times" onclick="closePostModal()"></i>
            </div>
            <form id="postForm" onsubmit="handlePostSubmit(event)">
                <input type="text" id="postTitle" placeholder="Título del proyecto" required>
                <textarea id="postDesc" placeholder="Describe tu creación..." required></textarea>
                <input type="text" id="postImg" placeholder="URL de la imagen (Opcional)">
                <select id="postTag">
                    <option value="Dev Web">Dev Web</option>
                    <option value="Discord Bot">Discord Bot</option>
                    <option value="Diseño UI">Diseño UI</option>
                    <option value="Roblox Assets">Roblox Assets</option>
                    <option value="Otros">Otros</option>
                </select>
                <button type="submit" class="btn-send">Publicar en Ecnhaca</button>
            </form>
        </div>
    </div>

    <section id="auth" class="auth-view hide">
        <div class="auth-card">
            <h1>Ecnhaca</h1>
            <div class="auth-tabs">
                <button id="tab-l" class="active" onclick="setMode('login')">Entrar</button>
                <button id="tab-r" onclick="setMode('reg')">Registro</button>
            </div>
            <form id="authForm" onsubmit="authSubmit(event)">
                <input type="text" id="uIn" placeholder="Usuario" required>
                <input type="email" id="eIn" class="hide" placeholder="Email">
                <input type="password" id="pIn" placeholder="Contraseña" required>
                <button type="submit" id="btnAuth">Acceder</button>
            </form>
        </div>
    </section>

    <div id="app" class="hide">
        <nav class="top-nav">
            <div class="nav-wrap">
                <div class="logo" onclick="showView('feed')">Ecnhaca</div>
                <div class="search-bar">
                    <i class="fa fa-search"></i>
                    <input type="text" placeholder="Buscar creadores..." oninput="searchUsers(this.value)">
                </div>
                <div class="nav-user" onclick="toggleMenu()">
                    <div id="myAv" class="av-sm"></div>
                    <div id="navMenu" class="drop hide">
                        <div onclick="showMyProfile()">Mi Perfil</div>
                        <div onclick="logout()" class="red">Cerrar Sesión</div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="container">
            <section id="v-feed" class="view">
                <div id="post-list" class="posts-grid"></div>
            </section>

            <section id="v-search" class="view hide">
                <div id="search-results" class="user-list"></div>
            </section>

            <section id="v-profile" class="view hide">
                <div class="profile-card">
                    <div id="pBanner" class="banner"></div>
                    <div class="p-info">
                        <div id="pAvLarge" class="av-lg"></div>
                        <h2 id="pUser">@username</h2>
                        <p id="pBio">Bio del usuario...</p>
                        <div class="p-stats">
                            <div><b id="pFolCount">0</b> seguidores</div>
                        </div>
                        <button id="btnFollow" onclick="toggleFollow()">Seguir</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/script.js"></script>
    <script src="/app.js"></script>
</body>
</html>
