<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecnhaca Social | Emmanuel</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="toast-container"></div>

    <div id="splash" class="splash-screen">
        <div class="loader-content">
            <h1 class="logo-text">Ecnhaca</h1>
            <div class="progress-bar"><div class="fill"></div></div>
        </div>
    </div>

    <section id="auth" class="auth-section hide">
        <div class="auth-card">
            <h2 class="brand">Ecnhaca</h2>
            <div class="tabs">
                <button id="tL" class="active" onclick="switchAuth('login')">Entrar</button>
                <button id="tR" onclick="switchAuth('reg')">Unirse</button>
            </div>
            <form id="fAuth" onsubmit="handleAuth(event)">
                <div class="input-group">
                    <i class="fa fa-user"></i>
                    <input type="text" id="uIn" placeholder="Nombre de usuario" required>
                </div>
                <div class="input-group hide" id="eGroup">
                    <i class="fa fa-envelope"></i>
                    <input type="email" id="eIn" placeholder="Correo electrónico">
                </div>
                <div class="input-group">
                    <i class="fa fa-lock"></i>
                    <input type="password" id="pIn" placeholder="Contraseña" required>
                </div>
                <button type="submit" id="btnMain" class="btn-submit">Iniciar Sesión</button>
            </form>
        </div>
    </section>

    <div id="app" class="hide">
        <nav class="nav">
            <div class="nav-content">
                <h2 class="logo" onclick="irA('search')">Ecnhaca</h2>
                <div class="search-box">
                    <i class="fa fa-search"></i>
                    <input type="text" id="sIn" placeholder="Busca perfiles similares..." oninput="doSearch(this.value)">
                </div>
                <div class="user-menu" onclick="toggleDrop()">
                    <div id="navAv" class="av-small"></div>
                    <div id="drop" class="dropdown hide">
                        <div class="drop-item" onclick="openMe()"><i class="fa fa-user"></i> Mi Perfil</div>
                        <hr>
                        <div class="drop-item out" onclick="logout()"><i class="fa fa-power-off"></i> Salir</div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="wrapper">
            <section id="v-search" class="view">
                <div id="results" class="user-list"></div>
                <div id="empty" class="placeholder">
                    <i class="fa fa-users"></i>
                    <p>Descubre personas en Ecnhaca</p>
                </div>
            </section>

            <section id="v-profile" class="view hide">
                <div class="profile-card">
                    <div class="header-bg" id="pCol"></div>
                    <div class="p-body">
                        <div id="pAv" class="av-big"></div>
                        <h2 id="pUser">@usuario</h2>
                        <p id="pBio">Biografía del usuario</p>
                        <div class="stats">
                            <div class="stat"><b>Seguidores</b><span id="pFol">0</span></div>
                            <div class="stat"><b>Siguiendo</b><span id="pIng">0</span></div>
                        </div>
                        <button id="btnFol" class="btn-fol" onclick="doFollow()">Seguir</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/script.js"></script>
    <script src="/app.js"></script>
</body>
</html>
