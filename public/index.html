<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DevRoot | Emmanuel Director</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="toast" class="toast-hidden"></div>

    <div id="auth-screen" class="main-container">
        <div class="auth-card">
            <div class="side-brand">
                <h1>Dev<span>Root</span></h1>
                <p>Director: Emmanuel</p>
            </div>
            <div class="side-form" id="form-box">
                <h2 id="form-title">Iniciar Sesión</h2>
                <input type="email" id="email" placeholder="Email corporativo">
                <input type="password" id="pass" placeholder="Llave maestra">
                <button onclick="authAction()" id="btn-main" class="btn-primary">Conectar</button>
                <p class="toggle-text" onclick="toggleMode()">¿No tienes cuenta? <span>Crear una</span></p>
            </div>
        </div>
    </div>

    <div id="dashboard" class="dashboard-hidden">
        <nav class="dash-nav">
            <div class="logo">Dev<span>Root</span></div>
            <div class="nav-actions">
                <button onclick="logout()" class="btn-outline">Cerrar Sesión</button>
                <button onclick="deleteAccount()" class="btn-danger">Eliminar Cuenta</button>
            </div>
        </nav>
        <div class="dash-body">
            <div class="welcome-card">
                <h2>Panel de Control v6.0</h2>
                <p>Bienvenido, <span id="user-name">Director</span>. Todos los sistemas están operativos.</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
