<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Pro | Sistema de Gestión</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="alert-container"></div>

    <div id="screen-loader">
        <div class="loader-content">
            <div class="logo-text">System<span>Pro</span></div>
            <div class="progress-bar"><span></span></div>
        </div>
    </div>

    <section id="auth-section">
        <div class="glass-card animate-entry">
            <div class="auth-visual">
                <div class="visual-top">
                    <h1>System<span>Pro</span></h1>
                    <p>La nueva era de la gestión digital.</p>
                </div>
                <div class="visual-bottom">
                    <div class="badge">V15.0 FAST</div>
                </div>
            </div>

            <div class="auth-fields">
                <div id="form-box">
                    <header>
                        <h2 id="ui-title">Bienvenido</h2>
                        <p id="ui-subtitle">Introduce tus datos para continuar.</p>
                    </header>

                    <div class="input-stack">
                        <div class="field hidden" id="field-user">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" id="in-user" placeholder=" " autocomplete="off">
                            <label>Usuario</label>
                        </div>

                        <div class="field">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="text" id="in-id" placeholder=" " autocomplete="off">
                            <label id="lbl-id">Email o Usuario</label>
                        </div>

                        <div class="field">
                            <i class="fa-regular fa-lock"></i>
                            <input type="password" id="in-pass" placeholder=" " autocomplete="off">
                            <label>Contraseña</label>
                            <button class="toggle-eye" onclick="togglePass()"><i class="fa-regular fa-eye"></i></button>
                        </div>
                    </div>

                    <button class="btn-action" onclick="submitAuth()">
                        <span id="btn-text">INICIAR SESIÓN</span>
                        <div class="spinner hidden"></div>
                    </button>

                    <footer>
                        <span id="foot-hint">¿No tienes una cuenta?</span>
                        <button onclick="toggleMode()" id="btn-switch">Crear Cuenta</button>
                    </footer>
                </div>
            </div>
        </div>
    </section>

    <main id="app-section" class="hidden">
        <nav class="header-nav">
            <div class="nav-container">
                <div class="brand">System<span>Pro</span></div>
                
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="search-in" placeholder="Buscar personas..." oninput="doSearch(this.value)">
                    <div id="search-drop" class="drop-hidden"></div>
                </div>

                <div class="user-control" onclick="toggleMenu()">
                    <div class="avatar" id="u-init">U</div>
                    <div class="user-data">
                        <span id="u-name">Usuario</span>
                        <small>Online</small>
                    </div>
                    <i class="fa-solid fa-chevron-down"></i>

                    <div id="drop-menu" class="drop-hidden">
                        <ul>
                            <li onclick="location.reload()"><i class="fa-solid fa-power-off"></i> Salir</li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <section class="main-content">
            <div class="feed-wrapper">
                <div class="empty-box animate-pop">
                    <div class="icon-wrap">
                        <i class="fa-regular fa-folder-open"></i>
                    </div>
                    <h2>No hay publicaciones</h2>
                    <p>El contenido aparecerá aquí cuando esté disponible.</p>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
