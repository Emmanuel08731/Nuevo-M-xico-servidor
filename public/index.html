<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ecnhaca | Elite Platform</title>
    
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="splash" class="splash-screen">
        <div class="splash-content">
            <h1 class="logo-anim">ECNHACA</h1>
            <div class="loader-track">
                <div id="loader-bar" class="loader-fill"></div>
            </div>
            <p id="loader-status">Iniciando protocolos...</p>
        </div>
    </div>

    <div id="toast-container" class="toast-wrapper"></div>

    <section id="auth-view" class="auth-section hide">
        <div class="auth-box animate-in">
            <header class="auth-header">
                <h2>Ecnhaca Platform</h2>
                <p>Accede a la red exclusiva para desarrolladores.</p>
            </header>

            <div class="auth-selector">
                <button id="btn-tab-login" class="tab-btn active" onclick="toggleAuthTab('login')">Entrar</button>
                <button id="btn-tab-register" class="tab-btn" onclick="toggleAuthTab('register')">Registrarse</button>
            </div>

            <form id="auth-form" onsubmit="handleAuth(event)">
                <div class="input-field">
                    <label>Usuario Único</label>
                    <div class="input-inner">
                        <i class="fa fa-at"></i>
                        <input type="text" id="inp-user" placeholder="ej: emmanuel_dev" required>
                    </div>
                </div>

                <div id="register-only" class="hide">
                    <div class="input-field">
                        <label>Correo Electrónico</label>
                        <div class="input-inner">
                            <i class="fa fa-envelope"></i>
                            <input type="email" id="inp-email" placeholder="dev@ecnhaca.com">
                        </div>
                    </div>
                </div>

                <div class="input-field">
                    <label>Contraseña Maestra</label>
                    <div class="input-inner">
                        <i class="fa fa-lock"></i>
                        <input type="password" id="inp-pass" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" id="main-auth-btn" class="btn-primary">Ingresar al Sistema</button>
            </form>
            
            <footer class="auth-footer">
                <p>Al acceder aceptas nuestras políticas de privacidad v2.0</p>
            </footer>
        </div>
    </section>

    <div id="app-view" class="app-container hide">
        
        <nav class="glass-nav">
            <div class="nav-content">
                <div class="nav-brand" onclick="appNav.home()">ECNHACA</div>
                
                <div class="nav-search">
                    <i class="fa fa-search"></i>
                    <input type="text" id="global-search" placeholder="Buscar personas o proyectos..." oninput="handleSearch(this.value)">
                    <div id="search-results" class="search-drop hide"></div>
                </div>

                <div class="nav-user">
                    <div id="my-avatar" class="avatar-pill" onclick="ui.toggleUserMenu()">
                        <div id="nav-av-circle" class="av-circle">E</div>
                        <i class="fa fa-chevron-down"></i>
                    </div>
                    <div id="user-dropdown" class="nav-menu hide">
                        <div class="menu-item" onclick="appNav.profile()"><i class="fa fa-user"></i> Mi Perfil</div>
                        <div class="menu-item" onclick="ui.openSettings()"><i class="fa fa-sliders"></i> Ajustes</div>
                        <hr>
                        <div class="menu-item logout" onclick="auth.logout()"><i class="fa fa-power-off"></i> Salir</div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="main-stage">
            
            <section id="tab-feed" class="view-tab">
                <div class="stage-header">
                    <h1>Muro de Actividad</h1>
                    <p>Contenido actualizado de la red profesional.</p>
                </div>
                <div id="feed-container" class="posts-grid"></div>
            </section>

            <section id="tab-profile" class="view-tab hide">
                <div id="profile-render"></div>
            </section>

        </main>

        <button class="fab-left" onclick="ui.openPostModal()">
            <i class="fa fa-plus"></i>
            <span>CREAR</span>
        </button>

    </div>

    <div id="modal-post" class="modal-overlay hide">
        <div class="modal-card animate-up">
            <header class="modal-header">
                <h3>Nuevo Proyecto</h3>
                <button class="close-btn" onclick="ui.closePostModal()">&times;</button>
            </header>
            <form id="post-form" onsubmit="handleNewPost(event)">
                <div class="modal-body">
                    <input type="text" id="p-title" placeholder="Título impactante" required>
                    <textarea id="p-content" placeholder="Escribe aquí los detalles, código o idea..." required></textarea>
                    
                    <div class="modal-row">
                        <select id="p-category">
                            <option value="Bot Development">Bot Development</option>
                            <option value="Web Design">Web Design</option>
                            <option value="Database">Database</option>
                            <option value="Other">Otro</option>
                        </select>
                        <input type="text" id="p-media" placeholder="URL Imagen (opcional)">
                    </div>
                </div>
                <footer class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="ui.closePostModal()">Descartar</button>
                    <button type="submit" class="btn-confirm">Publicar Proyecto</button>
                </footer>
            </form>
        </div>
    </div>

    <script src="/script.js"></script>
    <script src="/app.js"></script>
</body>
</html>
