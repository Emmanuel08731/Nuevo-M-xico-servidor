<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DevRoot | Emmanuel Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="auth-container" class="auth-wrapper">
        <div class="glass-card">
            <div class="side-dark">
                <h1>Dev<span>Root</span></h1>
                <p>Infraestructura v6.2.1</p>
                <div class="terminal"><code>> status: WAITING_AUTH</code></div>
            </div>

            <div id="login-section" class="side-white">
                <h2>Bienvenido de Nuevo</h2>
                <div class="input-group">
                    <label>Email Corporativo</label>
                    <input type="email" id="login-email" placeholder="dev@emmanuel.store">
                </div>
                <div class="input-group">
                    <label>Llave Maestra</label>
                    <input type="password" id="login-pass" placeholder="••••••••">
                </div>
                <button onclick="handleLogin()" class="btn-blue">Conectar al Nodo</button>
                <p class="switch">¿No tienes cuenta? <span onclick="toggleAuth()">Crea un Perfil</span></p>
            </div>

            <div id="register-section" class="side-white hidden">
                <h2>Crear Perfil Elite</h2>
                <div class="input-group">
                    <label>Nombre de Usuario (ID)</label>
                    <input type="text" id="reg-user" placeholder="@tu_usuario">
                </div>
                <div class="input-group">
                    <label>Email de Desarrollador</label>
                    <input type="email" id="reg-email" placeholder="correo@devroot.com">
                </div>
                <div class="input-group">
                    <label>Establecer Contraseña</label>
                    <input type="password" id="reg-pass" placeholder="Mínimo 8 caracteres">
                </div>
                <button onclick="handleRegister()" class="btn-blue">Inicializar Base de Datos</button>
                <p class="switch">¿Ya eres miembro? <span onclick="toggleAuth()">Ingresar</span></p>
            </div>
        </div>
    </div>

    <main id="dashboard" class="hidden">
        <div class="success-banner">Cuenta Conectada - Nodo Activo</div>
        <h1>Bienvenido, <span id="user-display">Emmanuel</span></h1>
    </main>

    <script src="script.js"></script>
</body>
</html>
