<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Network Hub | Connect</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="light-mode">

    <div id="boot-loader" class="screen-loader">
        <div class="spinner"></div>
        <p>Syncing Infrastructure...</p>
    </div>

    <section id="view-auth" class="auth-wrapper">
        <div class="auth-panel animate-fade-in">
            <div class="auth-branding">
                <h1>Network Hub</h1>
                <p>Join the professional developer community</p>
            </div>
            
            <div class="auth-selector">
                <button id="tab-login" class="active" onclick="setAuthMode('login')">Sign In</button>
                <button id="tab-register" onclick="setAuthMode('register')">Create Account</button>
            </div>

            <form id="auth-main-form" onsubmit="executeAuth(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="a-user" placeholder="Enter username" required>
                </div>
                <div id="email-group" class="form-group hide">
                    <label>Email Address</label>
                    <input type="email" id="a-email" placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>Security Key</label>
                    <input type="password" id="a-pass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary-full">Authorize Access</button>
            </form>
        </div>
    </section>

    <div id="view-app" class="hide">
        <nav class="glass-navbar">
            <div class="nav-container">
                <div class="nav-brand" onclick="navigate('feed')">HUB</div>
                
                <div class="search-module">
                    <i class="fa fa-search"></i>
                    <input type="text" id="global-search" placeholder="Search people, tags or projects..." oninput="handleGlobalSearch(this.value)">
                    <div id="search-results-panel" class="drop-results hide">
                        </div>
                </div>

                <div class="nav-actions">
                    <div id="user-trigger" class="profile-pill" onclick="toggleUserDropdown()">
                        <div id="nav-avatar" class="av-small"></div>
                        <span id="nav-username">Profile</span>
                        <i class="fa fa-chevron-down"></i>
                        
                        <div id="user-menu" class="menu-dropdown hide">
                            <div class="menu-link" onclick="navigate('profile')"><i class="fa fa-user-circle"></i> View Profile</div>
                            <div class="menu-link" onclick="openSettings()"><i class="fa fa-sliders"></i> Configuration</div>
                            <hr>
                            <div class="menu-link logout" onclick="processSignOut()"><i class="fa fa-power-off"></i> Exit System</div>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="app-layout">
            <section id="feed-container" class="content-view">
                <div class="view-header">
                    <h2>Global Activity</h2>
                    <p>Live updates from the developer network</p>
                </div>
                <div id="dynamic-grid" class="post-grid"></div>
            </section>
        </main>

        <button class="fab-action-left" onclick="openNewContentModal()">
            <i class="fa fa-plus"></i>
            <span>NEW POST</span>
        </button>
    </div>

    <div id="modal-creation" class="modal-overlay hide">
        <div class="modal-card">
            <h3>Share Project</h3>
            <form onsubmit="publishContent(event)">
                <input type="text" id="c-title" placeholder="Project Title" required>
                <textarea id="c-body" placeholder="Write description or code snippet..." required></textarea>
                <input type="text" id="c-img" placeholder="Visual asset URL (Optional)">
                <select id="c-cat">
                    <option value="DevOps">DevOps</option>
                    <option value="Frontend">Frontend</option>
                    <option value="Backend">Backend</option>
                    <option value="UI Design">UI Design</option>
                </select>
                <button type="submit" class="btn-confirm">Publish Now</button>
            </form>
            <button class="btn-cancel" onclick="closeCreationModal()">Discard</button>
        </div>
    </div>

    <script src="/script.js"></script>
    <script src="/app.js"></script>
</body>
</html>
